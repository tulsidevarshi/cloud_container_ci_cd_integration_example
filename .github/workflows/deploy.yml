name: Deploy to Azure Functions 
 
on: 
  push: 
    branches: ["main"] 
 
jobs: 
  deploy: 
    runs-on: ubuntu-latest 
 
    steps: 
    - name: Checkout code 
      uses: actions/checkout@v3 
 
    - name: Log in to Azure 
      uses: azure/login@v1 
      with: 
        creds: ${{ secrets.AZURE_CREDENTIALS }} 
 
    - name: Log in to ACR 
      run: az acr login --name myacrdevarshi 
 
    - name: Build and Push to ACR 
      run: | 
        docker build --platform linux/amd64 -t myacrdevarshi.azurecr.io/fastapi-function:latest . 
        docker push myacrdevarshi.azurecr.io/fastapi-function:latest 
 
    - name: Update Azure Function Container Image
      run: | 
        az webapp config container set --resource-group myResourceGroup --name fastapi-function-app-devarshi --container-image-name "myacrdevarshi.azurecr.io/fastapi-function:latest" --container-registry-url "https://myacrdevarshi.azurecr.io"

    - name: Force Instant Container Layer Pull (Flush Cache)
      run: |
        az functionapp restart --resource-group myResourceGroup --name fastapi-function-app-devarshi
        